  # ─────────────────────────────────────────
  # USERS - Historique des actions
  # ─────────────────────────────────────────
  /agencies/{agency_id}/users/{user_id}/actions:
    get:
      tags: [Users]
      operationId: getUserActions
      summary: Retrieve actions list of a specific user
      description: Returns the action history of a specific user/negotiator.
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the agency
        - name: user_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the user/agent
        - name: limit
          in: query
          schema: {type: integer, default: 1000, maximum: 1000}
          description: 'Number of records to return (max: 1000)'
        - name: offset
          in: query
          schema: {type: integer, default: 0}
          description: Number of records to skip
        - name: type
          in: query
          schema: {type: integer}
          description: Filter by action type → see catalog action_type
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      actions:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Action ID (returned as string)
                              example: '19344999'
                            type:
                              type: string
                              description: "Type d'action → voir catalog action_type"
                              example: '2'
                            user:
                              type: string
                              description: 'User ID (should be equal to {user_id})'
                              example: '1234'
                            contact:
                              type: string
                              nullable: true
                              description: Associated contact ID
                              example: '8520201'
                            date:
                              type: string
                              format: date
                              description: "Date de l'action"
                              example: 2018-09-11
                            time_start:
                              type: string
                              nullable: true
                              description: 'Start time (HH:MM:SS)'
                              example: '14:43:20'
                            time_end:
                              type: string
                              nullable: true
                              description: 'End time (HH:MM:SS)'
                              example: '15:43:00'
                            subject:
                              type: string
                              nullable: true
                              description: Action subject (can be the subject of an email)
                              example: More details on a new property
                            content:
                              type: string
                              nullable: true
                              description: Action content (can be the body of an email)
                              example: 'Hello, …'
                            properties:
                              type: object
                              nullable: true
                              description: Property/properties associated with the action
                              properties:
                                id:
                                  type: string
                                  example: '233030'
                                report:
                                  type: string
                                  nullable: true
                                price:
                                  type: string
                                  example: '2600000'
                                currency:
                                  type: string
                                  example: EUR
                                rating:
                                  type: string
                                  nullable: true
                                assessment:
                                  type: string
                                  nullable: true
                            referral:
                              type: string
                              nullable: true
                              description: Action origin
                            subreferral:
                              type: string
                              nullable: true
                              description: Action sub-origin
                            created_at:
                              type: string
                              format: date-time
                              example: '2018-09-11T14:43:20Z'
                            updated_at:
                              type: string
                              format: date-time
                              example: '2018-09-11T14:43:20Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # REQUESTS - Crossings par demande
  # ─────────────────────────────────────────
  /agencies/{agency_id}/requests/{request_id}/crossings:
    get:
      tags: [Requests]
      operationId: listRequestCrossings
      summary: Crossing list (matched properties) for a specific request
      description: |
        Returns the list of properties matching a given search request.
        Symmetric of `GET /properties/{property_id}/crossings` which returns
        the requests matching a property — here we start from a request to find properties.

        **Synchronisation incrémentale :**
        Pass the `timestamp` field returned by the last response to
        only retrieve crossings updated since that date.
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the agency
        - name: request_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the request de recherche
        - name: limit
          in: query
          schema: {type: integer, default: 10000, maximum: 10000}
          description: 'Number of records to return (max: 10000)'
        - name: offset
          in: query
          schema: {type: integer, default: 0}
          description: Number of records to skip
        - name: timestamp
          in: query
          schema: {type: integer}
          description: Returns crossings updated since this UNIX timestamp
        - name: step
          in: query
          schema: {type: integer}
          description: 'Filtrer par step (1=To suggest, 2=Already suggested, 3=Not suggested)'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      crossings:
                        type: array
                        items:
                          type: object
                          properties:
                            property_id:
                              type: integer
                              description: ID of the matched property
                              example: 1234567
                            step_id:
                              type: integer
                              description: '1=To suggest, 2=Already suggested, 3=Not suggested'
                              enum: [1, 2, 3]
                              example: 1
                            total:
                              type: string
                              description: Matching score from 0 to 100
                              example: '100'
                            created_at:
                              type: string
                              format: date-time
                              example: '2010-10-08T15:12:02Z'
                            updated_at:
                              type: string
                              format: date-time
                              example: '2014-04-10T09:37:18Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agencies/{agency_id}/users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: Retrieve the users list
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      users:
                        type: array
                        items: {$ref: '#/components/schemas/User'}
        '401':

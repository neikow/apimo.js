                  description: ID of the contact associated with the action
                  nullable: true
                  example: 220351
                properties:
                  type: array
                  description: List of property IDs associated with the action
                  items:
                    type: integer
                  example: [181297, 181298]
                subject:
                  type: string
                  description: Action subject
                  nullable: true
                  example: Visite appartement centre-ville
                content:
                  type: string
                  description: Detailed content of the action
                  nullable: true
                  example: 'Le client est intéressé, souhaite une deuxième visite.'
                referral:
                  type: integer
                  description: Action origin → see catalog origine
                  nullable: true
                subreferral:
                  type: integer
                  description: Action sub-origin
                  nullable: true
      responses:
        '200':
          description: Action updated - returns ID only (as string)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the updated action (returned as string by the API)
                    example: '19344239'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # CONTRACTS
  # ─────────────────────────────────────────
  /agencies/{agency_id}/contracts:
    get:
      tags: [Contracts]
      operationId: listContracts
      summary: Retrieve the contracts list
      description: |
        Returns the paginated list of contracts for an agency (mandates, sales, rentals...).

        **Classic pagination:**
        Use `limit` and `offset` to paginate through results.
        The `total_items` field indicates the total number of contracts.

        **Incremental synchronization (recommended):**
        Pass the `timestamp` field returned by the last response to
        only retrieve contracts created or updated since that date.
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the agency
        - name: limit
          in: query
          schema: {type: integer, default: 10000, maximum: 10000}
          description: 'Number of records to return (max: 10000)'
        - name: offset
          in: query
          schema: {type: integer, default: 0}
          description: Number of records to skip
        - name: timestamp
          in: query
          schema: {type: integer}
          description: Returns contracts created or updated since this UNIX timestamp
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      contracts:
                        type: array
                        items:
                          type: object
                          description: Real estate contract
                          properties:
                            id:
                              type: integer
                              description: Unique ID of the contract
                              example: 12345
                            step:
                              type: integer
                              description: Contract step → see catalog contract_step
                              example: 1
                            agency:
                              type: integer
                              description: Agency ID
                              example: 182
                            property:
                              type: integer
                              description: Property ID
                              example: 181297
                            currency:
                              type: string
                              description: Default currency ISO 4217
                              example: EUR
                            price:
                              type: number
                              description: Final contract price
                              example: 250000
                            price_net:
                              type: number
                              nullable: true
                              description: Net seller price (cash back to owner)
                            commission:
                              type: number
                              nullable: true
                              description: Total transaction commission
                            commission_agency:
                              type: number
                              nullable: true
                              description: Agency commission
                            commission_owner:
                              type: number
                              nullable: true
                              description: Commission for the owner
                            commission_customer:
                              type: number
                              nullable: true
                              description: Buyer commission
                            vat:
                              type: number
                              nullable: true
                              description: VAT amount
                            vat_rate:
                              type: number
                              nullable: true
                              description: 'VAT rate in %'
                            deposit:
                              type: number
                              nullable: true
                              description: Security deposit amount
                            project_at:
                              type: string
                              format: date
                              nullable: true
                              description: Project date
                            offer_at:
                              type: string
                              format: date
                              nullable: true
                              description: Offer date
                            commitment_at:
                              type: string
                              format: date
                              nullable: true
                              description: Commitment / promise date
                            condition_precedent_at:
                              type: string
                              format: date
                              nullable: true
                              description: Conditions precedent expiry date
                            contract_scheduled_at:
                              type: string
                              format: date
                              nullable: true
                              description: Scheduled deed signing date
                            contract_at:
                              type: string
                              format: date
                              nullable: true
                              description: Notarial deed signing date
                            collected_at:
                              type: string
                              format: date
                              nullable: true
                              description: Funds collection date
                            legal_notice_at:
                              type: string
                              format: date
                              nullable: true
                              description: Legal notice date
                            contacts:
                              type: array
                              description: List of contacts linked to the contract
                              items:
                                type: object
                            entries:
                              type: array
                              description: List of contract entries
                              items:
                                type: object
                            comment:
                              type: string
                              nullable: true
                              description: Free comment
                            created_at:
                              type: string
                              format: date-time
                              description: Creation date
                            updated_at:
                              type: string
                              format: date-time
                              description: Last update date
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # RESIDENCES
  # ─────────────────────────────────────────
  /agencies/{agency_id}/residences:
    get:
      tags: [Residences]
      operationId: listResidences
      summary: Retrieve the residences list
      description: |
        Returns the paginated list of residences and buildings for an agency.

        **Classic pagination:**
        Use `limit` and `offset` to paginate through results.
        The `total_items` field indicates the total number of residences.

        **Incremental synchronization (recommended):**
        Pass the `timestamp` field returned by the last response to
        only retrieve residences created or updated since that date.

        > ⚠️ **Note on types** : all numeric fields (id, floors, lots,
        > longitude, latitude...) are returned as **string** by the real API.
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the agency
        - name: limit
          in: query
          schema: {type: integer, default: 10000, maximum: 10000}
          description: 'Number of records to return (max: 10000)'
        - name: offset
          in: query
          schema: {type: integer, default: 0}
          description: Number of records to skip
        - name: timestamp
          in: query
          schema: {type: integer}
          description: Returns residences created or updated since this UNIX timestamp
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      residences:
                        type: array
                        items:
                          type: object
                          description: Residence or building
                          properties:
                            id:
                              type: string
                              description: Unique ID of the residence (returned as string)
                              example: '35704'
                            user:
                              type: string
                              description: Responsible user ID (returned as string)
                              example: '8265'
                            type:
                              type: string
                              description: Residence type → see catalog property_building
                              example: '2'
                            name:
                              type: string
                              description: Residence name
                              example: LES GLYCINES
                            reference:
                              type: string
                              nullable: true
                              description: Residence reference
                            location_reference:
                              type: string
                              nullable: true
                              description: Location reference
                            address:
                              type: string
                              description: Residence address
                              example: '7, route des Francs Tireurs'
                            address_more:
                              type: string
                              nullable: true
                              description: Additional address details
                            city:
                              type: object
                              properties:
                                id:
                                  type: string
                                  description: City ID (returned as string)
                                  example: '183085'
                                name:
                                  type: string
                                  example: Aubonne
                                zipcode:
                                  type: string
                                  example: '1170'
                            district:
                              type: object
                              nullable: true
                              properties:
                                id:
                                  type: string
                                  example: '18'
                                name:
                                  type: string
                                  example: Centre
                            country:
                              type: string
                              description: ISO 3166-1 alpha-2 country code
                              example: CH
                            longitude:
                              type: string
                              description: GPS longitude (returned as string)
                              example: '6.39172'
                            latitude:
                              type: string
                              description: GPS latitude (returned as string)
                              example: '46.49536'
                            construction_year:
                              type: string
                              nullable: true
                              description: Construction year
                              example: '2006'
                            standing:
                              type: string
                              nullable: true
                              description: Standing → see catalog property_standing
                              example: '4'
                            floors:
                              type: string
                              nullable: true
                              description: Number of floors in the building (returned as string)
                              example: '4'
                            lots:
                              type: string
                              nullable: true
                              description: Number of lots (returned as string)
                              example: '12'
                            total_shares:
                              type: string
                              nullable: true
                              description: Total shares
                            code:
                              type: string
                              nullable: true
                              description: Residence entry code
                            code_at:
                              type: string
                              format: date-time
                              nullable: true
                              description: Date of the last entry code
                            comment:
                              type: string
                              nullable: true
                              description: Free comment
                            contacts:
                              type: array
                              description: 'Contacts linked to the residence (co-owners, caretakers...)'
                              items:
                                type: object
                                properties:
                                  contact:
                                    type: string
                                    description: Contact ID
                                    example: '4753321'
                                  type:
                                    type: string
                                    description: Type of link with the residence
                                    example: '3'
                                  shares:
                                    type: string
                                    nullable: true
                                    description: Contact shares
                                    example: '34.00'
                                  property:
                                    type: object
                                    nullable: true
                                    description: Property associated with the contact in the residence
                                    properties:
                                      rooms:
                                        type: string
                                        example: '3'
                                      bedrooms:
                                        type: string
                                        example: '2'
                                      subtype:
                                        type: string
                                        example: '63'
                                      area:
                                        type: string
                                        example: '300.00'
                                      floor:
                                        type: object
                                        properties:
                                          type:
                                            type: integer
                                            example: 23
                                          value:
                                            type: integer
                                            nullable: true
                                  comment:
                                    type: string
                                    nullable: true
                                    description: Comment about the contact
                                    example: test
                            created_at:
                              type: string
                              format: date-time
                              description: "Creation date. Format returned by API: 'YYYY-MM-DD HH:MM:SS'"
                              example: '2015-11-17T14:13:44Z'
                            updated_at:
                              type: string
                              format: date-time
                              description: "Last update date. Format returned by API: 'YYYY-MM-DD HH:MM:SS'"
                              example: '2017-04-07T11:12:06Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # USERS

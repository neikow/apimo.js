            cities:
              type: array
              items: {type: object}
            locations:
              type: array
              items: {type: object}
            types:
              type: array
              items: {type: integer}
            subtype:
              type: integer
              nullable: true
        created_at:
          type: string
          format: date-time
          description: Creation date
          example: '2014-11-11T11:22:46Z'
        updated_at:
          type: string
          format: date-time
          description: Last update date
          example: '2014-12-03T15:08:15Z'

    # ─────────────────────────────────────────
    # SCHÉMA REQUEST (demande de recherche)
    # Source : doc officielle + réponse réelle API
    # Note : les IDs sont retournés en string par l'API
    # ─────────────────────────────────────────
    Request:
      type: object
      required: [contact, user, category, country]
      description: Contact search request
      properties:
        id:
          type: integer
          description: Unique ID of the request
          example: 156488
        active:
          type: boolean
          description: Whether the request is active
          example: false
        contact:
          type: string
          description: 'Associated contact ID (returned as string by the API). **Required on creation (POST)**'
          example: '220351'
        user:
          type: string
          description: 'Responsible negotiator ID (returned as string by the API). **Required on creation (POST)**'
          example: '3896'
        ranking:
          type: integer
          nullable: true
          description: Request rating
        last_action:
          type: string
          format: date-time
          nullable: true
          description: Date of the last action
        auto:
          type: boolean
          description: Whether matching is automatic
          example: true
        validated:
          type: boolean
          description: Whether the system validated the automatic matching
          example: false
        emailing:
          type: object
          description: Request emailing settings
          properties:
            subscription:
              type: string
              description: Emailing subscription → see catalog subscription
              example: '1'
            last_at:
              type: string
              format: date-time
              nullable: true
              description: Date of the last emailing
        category:
          type: string
          description: "Searched property category → see catalog property_category (e.g. '1'=Sale, '2'=Rental). **Required on creation (POST)**"
          example: '1'
        subcategory:
          type: string
          nullable: true
          description: Subcategory → see catalog property_subcategory
        types:
          type: array
          description: Searched property types → see catalog property_type
          items:
            type: string
          example: ['1', '2']
        subtype:
          type: string
          nullable: true
          description: Subtype → see catalog property_subtype
        referral:
          type: string
          nullable: true
          description: Search origin → see catalog origine
        subreferral:
          type: string
          nullable: true
          description: Search sub-origin
        country:
          type: string
          description: 'ISO 3166-1 alpha-2 country code. **Required on creation (POST)**'
          example: FR
        locations:
          type: array
          description: Geographic search areas
          items:
            type: object
            properties:
              region:
                type: object
                nullable: true
                description: Region
              city:
                type: object
                nullable: true
                description: City
                properties:
                  id:
                    type: string
                    example: '2039'
                  name:
                    type: string
                    example: Antibes
              district:
                type: object
                nullable: true
                description: District
        coordinates:
          type: object
          nullable: true
          description: GPS coordinates of the search area
        sector:
          type: string
          nullable: true
          description: Agency customized sector
        zone:
          type: string
          nullable: true
          description: Search area
        rooms_operator:
          type: string
          description: "Rooms operator: '1'=equal, '2'=greater or equal, '3'=less or equal"
          enum: ['1', '2', '3']
          example: '2'
        rooms:
          type: integer
          nullable: true
          description: Minimum number of rooms
        bedrooms:
          type: integer
          nullable: true
          description: Number of bedrooms minimum
          example: 0
        standing:
          type: integer
          nullable: true
          description: Standing → see catalog property_standing
        view:
          type: object
          nullable: true
          description: Searched view
          properties:
            type:
              type: integer
              nullable: true
              description: View type → see catalog property_view_type
            landscape:
              type: integer
              nullable: true
              description: Landscape type → see catalog property_view_landscape
        condition:
          type: integer
          nullable: true
          description: Property condition → see catalog property_condition
        availability:
          type: integer
          nullable: true
          description: Availability → see catalog property_availability
        margin:
          type: string
          description: 'Matching margin in %'
          example: '10'
        area:
          type: object
          description: Searched area range
          properties:
            min:
              type: string
              nullable: true
              description: Minimum area
              example: '100'
            max:
              type: string
              nullable: true
              description: Maximum area
            unit:
              type: string
              description: Area unit → see catalog unit_area
              example: '1'
        price:
          type: object
          description: Searched price range
          properties:
            min:
              type: string
              nullable: true
              description: Minimum price
            max:
              type: string
              nullable: true
              description: Maximum price
              example: '400000'
            currency:
              type: string
              description: Currency ISO 4217
              example: EUR
        floor:
          type: object
          description: Searched floor
          properties:
            operator:
              type: string
              description: "Operator: '1'=equal, '2'=greater or equal, '3'=less or equal"
              enum: ['1', '2', '3']
              example: '1'
            type:
              type: integer
              nullable: true
              description: Floor type → see catalog property_floor
            value:
              type: integer
              nullable: true
              description: 'Floor number (0=ground, 1=first...)'
        areas:
          type: array
          description: Searched room and area details
          items:
            type: object
            properties:
              type:
                type: integer
                description: Room type → see catalog property_areas
                example: 18
              number:
                type: integer
                description: Number of rooms
                example: 1
              area_min:
                type: number
                nullable: true
                description: Minimum room area
        proximities:
          type: array
          description: Desired proximities → see catalog property_proximity
          items: {type: integer}
        services:
          type: array
          description: Desired services → see catalog property_service
          items: {type: integer}
        activities:
          type: array
          description: Desired activities → see catalog property_activity
          items: {type: integer}
        tags:
          type: array
          description: Tags → see catalog tags
          items: {type: integer}
        tags_customized:
          type: array
          description: Agency customized tags
          items:
            type: object
            properties:
              comment: {type: string}
        comment:
          type: string
          description: Free comment
          example: ''
        free_criteria:
          type: string
          description: Additional free criteria
          example: ''
        created_at:
          type: string
          format: date-time
          description: "Creation date. Format returned by the API: 'YYYY-MM-DD HH:MM:SS'"
          example: '2010-10-08T15:12:02Z'
        created_by:
          type: string
          description: Creator user ID
          example: '3896'
        updated_at:
          type: string
          format: date-time
          description: "Last update date. Format returned by the API: 'YYYY-MM-DD HH:MM:SS'"
          example: '2014-04-10T09:37:18Z'
        updated_by:
          type: string
          description: Last modifier user ID
          example: '3896'

security:
  - basicAuth: []

paths:

  # ─────────────────────────────────────────
  # CATALOGS
  # ─────────────────────────────────────────
  /catalogs:
    get:
      tags: [Catalogs]
      operationId: listCatalogs
      summary: Get a list of catalogs
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CatalogList'}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /catalogs/{catalog_id}:
    get:
      tags: [Catalogs]
      operationId: getCatalog
      summary: Get a specific catalog
      parameters:
        - name: catalog_id
          in: path
          required: true
          schema: {type: string}
          description: 'Catalog name (e.g. property_type, property_category...)'
        - name: culture
          in: query
          schema: {type: string, example: fr}
          description: Label language (ISO 639-1)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CatalogEntry'}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # AGENCIES
  # ─────────────────────────────────────────
  /agencies:
    get:
      tags: [Agencies]
      operationId: listAgencies
      summary: Retrieve the business units list
      description: |
        Returns the paginated list of agencies.

        **Classic pagination:**
        Use `limit` and `offset` to paginate through results.
        The `total_items` field in the response indicates the total number of agencies.
        If greater than `offset + limit`, there are more pages to fetch.

        Example to paginate through 2500 agencies with limit=1000:
        - Page 1 : `?limit=1000&offset=0`
        - Page 2 : `?limit=1000&offset=1000`
        - Page 3 : `?limit=1000&offset=2000`
      parameters:
        - name: limit
          in: query
          schema: {type: integer, default: 1000, maximum: 1000}
          description: 'Number of records to return (max: 1000)'
        - name: offset
          in: query
          schema: {type: integer, default: 0}
          description: Number of records to skip
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      agencies:
                        type: array
                        items: {$ref: '#/components/schemas/Agency'}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # PROPERTIES
  # ─────────────────────────────────────────
  /agencies/{agency_id}/properties:
    get:
      tags: [Properties]
      operationId: listProperties
      summary: Retrieve the properties list
      description: |
        Retourne la liste paginée des biens d'une agence.

        **Classic pagination:**
        Use `limit` and `offset` to paginate through results.
        The `total_items` field in the response indicates the total number of properties.
        If greater than `offset + limit`, there are more pages to fetch.

        Example to paginate through 2500 properties with limit=1000:
        - Page 1 : `?limit=1000&offset=0`
        - Page 2 : `?limit=1000&offset=1000`
        - Page 3 : `?limit=1000&offset=2000`

        **Incremental synchronization (recommended):**
        Pass the `timestamp` field returned by the last response to
        only retrieve properties created or updated since that date.
        Ideal for keeping a local database in sync without reloading everything.

        Example: `?timestamp=1712000000`
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the agency
        - name: limit
          in: query
          schema: {type: integer, default: 1000, maximum: 1000}
          description: 'Number of records to return (max: 1000)'
        - name: offset
          in: query
          schema: {type: integer, default: 0}
          description: Number of records to skip
        - name: timestamp
          in: query
          schema: {type: integer}
          description: Returns properties created or updated since this UNIX timestamp
        - name: step
          in: query
          schema: {type: integer}
          description: Filter by step → see catalog property_step
        - name: status
          in: query
          schema: {type: integer}
          description: Filter by status → see catalog property_status
        - name: group
          in: query
          schema: {type: integer}
          description: Filter by group → see catalog property_group
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      properties:
                        type: array
                        items: {$ref: '#/components/schemas/Property'}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Properties]
      operationId: createProperty
      summary: Create a new property
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PropertyInput'
                - required: [reference, user]
      responses:
        '200':
          description: Property created - returns ID and dates
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 19344239
                  created_at:
                    type: string
                    format: date-time
                    example: '2020-02-18T15:02:34Z'
                  updated_at:
                    type: string
                    format: date-time
                    example: '2020-02-18T15:52:26Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agencies/{agency_id}/properties/{property_id}:
    put:
      tags: [Properties]
      operationId: updateProperty
      summary: Update a property
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PropertyInput'}
      responses:
        '200':
          description: Property updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 19344239
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # PROPERTY - Provider
  # ─────────────────────────────────────────
  /agencies/{agency_id}/properties/{property_id}/provider:
    put:
      operationId: updatePropertyProvider
      tags: [Property Provider]
      summary: Update information related to the publishing of the property
      description: Updates the publishing information of a property on a partner portal (URL and publication date).
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the agency
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
          description: Unique ID of the property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  description: URL of the property on the partner portal or website
                  example: 'http://www.monportail.fr/bien/12345'
                date:
                  type: string
                  format: date-time
                  description: 'Publication date of the property (format YYYY-MM-DD HH:MM:SS)'
                  example: '2024-10-10T10:45:24Z'
      responses:
        '200':
          description: Publishing information updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: 'http://...'
                  date:
                    type: string
                    example: '2024-10-10T10:45:24Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # PROPERTY - Providers (accès portails)
  # ─────────────────────────────────────────
  /agencies/{agency_id}/properties/{property_id}/providers:
    get:
      operationId: listPropertyProviders
      tags: [Property Provider]
      summary: Provider list for a specific property
      description: Returns the list of partner portals that have access to this property.
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
        - name: provider
          in: query
          required: false
          schema: {type: integer}
          description: Unique reference of the partner portal
        - name: step
          in: query
          required: false
          schema: {type: integer, default: 1, enum: [1, 2]}
          description: '1 = active, 2 = inactive'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    type: integer
                    description: Partner portal ID
                    example: 100
                  step:
                    type: integer
                    description: '1 = active, 2 = inactive'
                    example: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      operationId: grantPropertyProvider
      tags: [Property Provider]
      summary: Grant property access to a provider
      description: Grants one or more partner portals access to publish this property.
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: integer
                  description: Unique reference of the partner portal
                  example: 100
                step:
                  type: integer
                  description: '1 = active, 2 = inactive'
                  default: 1
                  enum: [1, 2]
                  example: 1
      responses:
        '200':
          description: Access granted - returns the updated providers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: integer
                          example: 100
                        step:
                          type: integer
                          example: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # PROPERTY MEDIA - Photos
  # ─────────────────────────────────────────
  /agencies/{agency_id}/properties/{property_id}/pictures:
    post:
      tags: [Property Media]
      operationId: uploadPropertyPicture
      summary: Upload a picture for a property
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reference, content]
              properties:
                reference:
                  type: string
                  description: Your unique reference for the photo
                  example: 69f36ec470396
                content:
                  type: string
                  description: Photo content in base64
                comments:
                  type: array
                  items:
                    type: object
                    properties:
                      language: {type: string, example: fr}
                      comment: {type: string}
      responses:
        '200':
          description: Photo uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: {type: integer, example: 66321497}
                  rank: {type: integer, example: 1}
                  url: {type: string, format: uri}
                  width_max: {type: integer, example: 1430}
                  height_max: {type: integer, example: 710}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agencies/{agency_id}/properties/{property_id}/pictures/{picture_id}:
    delete:
      tags: [Property Media]
      operationId: deletePropertyPicture
      summary: Delete a picture from a property
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
        - name: picture_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        '200':
          description: Photo deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean, example: true}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # PROPERTY MEDIA - Vidéos / Visites virtuelles
  # ─────────────────────────────────────────
  /agencies/{agency_id}/properties/{property_id}/medias:
    post:
      tags: [Property Media]
      operationId: addPropertyMedia
      summary: Add or embed a media (virtual tour, video...)
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, content]
              properties:
                reference:
                  type: string
                  description: Your unique reference
                type:
                  type: integer
                  description: 'Media type: 1=Dailymotion, 2=Youtube, 9=HTML, 12=Matterport, 15=Vimeo, 19=Clap.video'
                  enum: [1, 2, 9, 12, 15, 19]
                  example: 2
                content:
                  type: string
                  description: HTML content or HTTP link of the media
                  example: 'https://youtu.be/JGowo0ARgPo'
      responses:
        '200':
          description: Media added
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: {type: integer, example: 123456}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agencies/{agency_id}/properties/{property_id}/medias/{media_id}:
    delete:
      tags: [Property Media]
      operationId: deletePropertyMedia
      summary: Delete a media from a property
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
        - name: media_id
          in: path
          required: true
          schema: {type: integer}
      responses:
        '200':
          description: Media deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean, example: true}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─────────────────────────────────────────
  # PROPERTY MEDIA - Documents
  # ─────────────────────────────────────────
  /agencies/{agency_id}/properties/{property_id}/documents:
    post:
      tags: [Property Media]
      operationId: addPropertyDocument
      summary: Add a document to a property
      parameters:
        - name: agency_id
          in: path
          required: true
          schema: {type: integer}
        - name: property_id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, content]
              properties:
                name:
                  type: string
                  description: File name
                  example: diagnostics.pdf
                type_id:
                  type: integer
